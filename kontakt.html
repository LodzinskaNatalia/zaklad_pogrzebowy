<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zakład pogrzebowy</title>
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/css/bootstrap.min.css">
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.4/jquery.min.js"></script>
    <script src="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/js/bootstrap.min.js"></script>

    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap');
        *{
            padding: 0;
            margin: 0;
            box-sizing: border-box;
        }
        body{
            background-color: rgb(236, 231, 231);
            height: 100%;
            min-height: 100vh;
        }
        p,h2,h3,h1{
            color: black;
        }
        p{
            display: block;
            margin-block-start: 1em;
            margin-block-end: 1em;
            margin-inline-start: 0px;
            margin-inline-end: 0px;
            unicode-bidi: isolate;

        }
        h1 {
            display: block;
            font-size: 2em;
            margin-block-start: 0.67em;
            margin-block-end: 0.67em;
            margin-inline-start: 0px;
            margin-inline-end: 0px;
            font-weight: bold;
            unicode-bidi: isolate;
        }
        h2 {
            display: block;
            font-size: 1.5em;
            margin-block-start: 0.83em;
            margin-block-end: 0.83em;
            margin-inline-start: 0px;
            margin-inline-end: 0px;
            font-weight: bold;
            unicode-bidi: isolate;
        }
        .body{
           min-height: 100vh;
           display: grid;
           grid-template-columns: repeat(24, 1fr);
           grid-template-rows: auto 1fr auto;
           gap: 15px;
        }
        header {
          display: grid;
          align-items: center;
          grid-column: 1 / 25;
          background-color: rgb(212, 208, 208);
        }
        .logo{
           
            grid-column:1 / 5;
         
            padding:20px;
        }
        header img{
            width: 150px;
        }
        .header{
            grid-column:5 / 25;
            text-align:center;
            padding:20px;
            color: goldenrod;
            font-size: 32px;
            font-family: 'Great Vibes';
        }
        .header h1, .header h2{
            color: goldenrod;
            
            font-family: 'Great Vibes';
            font-weight: bolder!important;
        }
       nav{
            grid-column: 1/25;
            display: grid;
            grid-template-columns:repeat(3,1fr);
            gap:20px;
            margin-bottom: 20px;
            margin-left: 20px;
            margin-right: 20px;
        }
        nav a{
            background-color: black;
            color: goldenrod!important;
            text-decoration: none!important;
            border-radius: 5px;
            font-weight: bold;
            padding: 15px;
            text-align: center;
            font-size: 24px;
            
        }
        nav a:hover{
            box-shadow: 0 0 5px 5px rgba(218, 165, 32, 0.596);
            text-decoration: none!important;
        }
        
       
        main{
            grid-column:1 / 25;
            display:grid;
            text-align: center;
        }
        
        .zdj{
            grid-column:1 / 25;
            display:grid;
            grid-template-columns:repeat(5,1fr);
            gap:10px;
            padding-bottom: 20px;
            padding-top: 20px;
            padding-left: 20px;
            padding-right: 20px;
            
        }
        .img{
            
            background-color: #d4d0d0;
            width: 100%;
            text-align: center;
            border-radius: 10px;
        }
        .img img{
            width: 50%;

        }
        .img:hover{
            box-shadow: 0 0 5px 5px rgba(0, 0, 0, 0.596);

        }
        article{
            grid-column:1 / 25;
            padding:20px;
            font-size: 32px;
        }
        article h3 {
            margin: 0;
            padding: 20px;
            font-size: 32px;
            font-weight: bold;
        }

        article p {
            margin: 0;
            padding: 0 20px;
            font-size: 24px;
            line-height: 1.5;
        }
        
        footer{

            grid-column:1 / 25;
        }
        .big{
            grid-column:1 / 25;
            display: grid;
            gap: 5px;
            text-align: center;
            padding: 20px;
        }
        
        .kontakt{
            grid-column:1 / 25;
            border:1px solid black;
            margin-top:20px;
        }
        .kontakt h2{
                background-color: rgb(212, 208, 208);
                margin: 0;
                padding: 20px;
                font-size: 32px;
        }
        .kontakt p{
            padding: 20px;
            font-size: 24px;
            margin: 0;
        }
        .lokalizacja{
            grid-column:1 / 25;
            border:1px solid black;
            margin-top:20px;
        }
        .lokalizacja h2{
                background-color: rgb(212, 208, 208);
                padding:20px;
                font-size: 32px;
                margin: 0;
        }
        .lokalizacja p{
            padding: 20px;
            font-size: 24px;
            margin: 0;
        }
        .small{
            display:flex;
            justify-content:center;
            align-items:center;
            padding: 20px;
            background-color: rgb(212, 208, 208);
                    
        }
        main{
            flex: 1;
        }
        /*footer img{
            margin-right: 20px;
        }*/
        .slider{
            display: grid;
            grid-column:1 / 25;

        }
        #myCarousel{
            display: grid;
            grid-column:1 / 25;
            background-color: rgb(212, 208, 208);
        }
        .carousel-inner .item {
            text-align: center;
        }
        #myCarousel .carousel-inner {
            text-align: center;
        }

        #myCarousel .item img {
            display: inline-block;
            margin-bottom: 4%;
        }
        @media screen and (max-width: 780px) {
            .slider{
                display: none;
            }
            nav a{
                font-size: 20px;
            }
            h1, h2, h3{
                font-size: 24px;
            }
            .lokalizacja{
            grid-column:14 / 25;
            margin: 0;}
            .kontakt{
            grid-column:14 / 25;
            margin: 0;}
            .big{
                text-align: center;
                margin: 0;}
            
        }
        
    </style>
</head>
<body>
    <div class="body">
    <header>
        <div class="logo">
       <a href="index.html"><img src="img/Logo.png" alt=""></a>
        </div>
        <div class="header">
            <h1>Zakład pogrzebowy</h1>
            <h2>Pogrzeby Piotrków</h2>
        </div>
    </header>
   <main>
    <div class="big">
            <div class="kontakt">
                <h2>
                    Kontakt
                </h2>
                
                <p>+48 601 298 311</p>
                <p>Emali: pogrzebypiotrków@gmail.com</p>
            </div>
            <div class="lokalizacja">
                <h2>
                    Lokalizacja
                </h2>
                <p>Ul. Żelazna 10<br>Piotrków Trybunalski</p>
            </div>
        </div>
   </main>
    <footer>
            <div class="small">
            <p>Emali: pogrzebypiotrków@gmail.com</p>
            </div>    
    </footer>
    </div>
    <script src="slider.js"></script>
</body>
</html>
